###############################################################################
# ML Validation → Deployment Pipeline
#
# Job 1 (validate): pull data with DVC, train the model, log to MLflow,
#                    export the Run ID, and persist it as an artifact.
# Job 2 (deploy):   download the artifact, check accuracy threshold (≥ 0.85),
#                    and mock-build a Docker image if the check passes.
###############################################################################

name: ML Pipeline – Validate & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:          # allow manual runs for testing

env:
  PYTHON_VERSION: "3.10"

# ─── Job 1: Validate ────────────────────────────────────────────────────────
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      # ── checkout & environment ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn dvc[s3] pandas numpy

      # ── data ────────────────────────────────────────────────────────────
      - name: Pull data with DVC
        run: dvc pull
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # ── train & log ─────────────────────────────────────────────────────
      - name: Train model and log to MLflow
        run: python train.py
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

      # ── export run id ───────────────────────────────────────────────────
      - name: Verify model_info.txt was created
        run: |
          if [ ! -f model_info.txt ]; then
            echo "::error::model_info.txt not found – training script did not export the Run ID."
            exit 1
          fi
          echo "MLflow Run ID: $(cat model_info.txt)"

      # ── persist artifact ────────────────────────────────────────────────
      - name: Upload model_info.txt
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  # ─── Job 2: Deploy ──────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: validate                       # runs only after validate succeeds
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow

      # ── retrieve artifact ───────────────────────────────────────────────
      - name: Download model_info.txt
        uses: actions/download-artifact@v4
        with:
          name: model-info

      # ── accuracy gate ───────────────────────────────────────────────────
      - name: Check accuracy threshold (≥ 0.85)
        run: python check_threshold.py
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

      # ── mock Docker build ───────────────────────────────────────────────
      - name: Mock Docker build
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: $RUN_ID"
          docker build --build-arg RUN_ID="$RUN_ID" -t ml-model:"$RUN_ID" .
          echo "✅ Docker image ml-model:$RUN_ID built successfully."